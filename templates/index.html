<!DOCTYPE html>
<html>
<head>
    <title>Animal Disease Assistant</title>
</head>

<body style="font-family: Arial, sans-serif; background-color:#f5f7fb; margin:0;">

<div style="max-width:600px; margin:30px auto; background:white; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); overflow:hidden;">

   
    <div style="background:#2c3e50; color:white; padding:15px; text-align:center; font-size:18px;">
        Animal Disease Assistant
    </div>

    
    <div id="chatbox" style="height:400px; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>

    <!-- Input Area -->
    <div style="display:flex; border-top:1px solid #ddd;">
        <input 
            type="text" 
            id="userInput" 
            placeholder="Describe symptoms..."
            style="flex:1; padding:12px; border:none; outline:none;"
        >
        <button 
            onclick="sendMessage()" 
            style="padding:12px 20px; border:none; background:#2ecc71; color:white; cursor:pointer;"
        >
            Send
        </button>
    </div>

    <!-- Footer -->
    <div style="text-align:center; font-size:12px; color:red; padding:10px;">
        This Project Under Development Thoda timee aayega.
    </div>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();
    let chatbox = document.getElementById("chatbox");

    if (message === "") return;

    // User message
    chatbox.innerHTML += `
        <div style="align-self:flex-end; background:#3498db; color:white; padding:10px; margin:5px 0; border-radius:10px; max-width:75%;">
            ${message}
        </div>
    `;

    fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        let formatted = data.reply
            .replace(/\n/g, "<br>")
            .replace(/- /g, "• ");

        
        chatbox.innerHTML += `
            <div style="align-self:flex-start; background:#ecf0f1; padding:10px; margin:5px 0; border-radius:10px; max-width:75%;">
                ${formatted}
            </div>
        `;

        chatbox.scrollTop = chatbox.scrollHeight;
    });

    input.value = "";
}


document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
